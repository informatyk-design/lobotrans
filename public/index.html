<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobotrans — Planer Tras</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── HEADER ───────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-brand">
      <span class="brand-icon">🚛</span>
      <span class="brand-name">Lobotrans</span>
    </div>

    <div class="header-nav">
      <button class="nav-btn" id="prev-week" title="Poprzedni tydzień">&#8249;</button>
      <span class="week-label" id="week-label"></span>
      <button class="nav-btn" id="next-week" title="Następny tydzień">&#8250;</button>
      <button class="today-btn" id="today-btn">Dziś</button>
    </div>

    <div class="header-actions">
      <button class="btn-secondary-header" id="manage-drivers-btn">
        &#128100; Kierowcy
      </button>
      <button class="btn-primary" id="manage-vehicles-btn">
        <span>&#9881;</span> Pojazdy
      </button>
    </div>
  </header>

  <!-- ── LEGEND BAR (day time range) ───────────────────────────────── -->
  <div class="time-legend" id="time-legend"></div>

  <!-- ── CALENDAR ───────────────────────────────────────────────────── -->
  <div class="calendar-container">
    <div class="calendar-wrapper" id="calendar-wrapper">
      <table class="calendar-table" id="calendar-table">
        <!-- Rendered by JS -->
      </table>
      <!-- Real-time indicator -->
      <div class="time-indicator" id="time-indicator" style="display:none">
        <div class="time-indicator-label" id="time-indicator-label"></div>
        <div class="time-indicator-line"></div>
      </div>
    </div>
  </div>

  <!-- ── TOOLTIP ────────────────────────────────────────────────────── -->
  <div class="tooltip" id="tooltip" style="display:none"></div>

  <!-- ════════════════════════════════════════════════════════════════
       MODAL: Add / Edit Route
  ═══════════════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="route-modal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="route-modal-title">Dodaj trasę</h2>
        <button class="modal-close" id="route-modal-close">&#10005;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="route-id">

        <div class="form-row">
          <div class="form-group">
            <label for="route-vehicle">Pojazd</label>
            <select id="route-vehicle" required></select>
          </div>
          <div class="form-group">
            <label for="route-date">Data</label>
            <input type="date" id="route-date" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="route-start">Godzina start</label>
            <input type="time" id="route-start" required>
          </div>
          <div class="form-group">
            <label for="route-end">Godzina koniec</label>
            <input type="time" id="route-end" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="route-from">Skąd</label>
            <input type="text" id="route-from" placeholder="Miasto / adres...">
          </div>
          <div class="form-group">
            <label for="route-to">Dokąd</label>
            <input type="text" id="route-to" placeholder="Miasto / adres...">
          </div>
        </div>

        <div class="form-group">
          <label for="route-driver">Kierowca</label>
          <select id="route-driver">
            <option value="">— brak kierowcy —</option>
          </select>
        </div>

        <div class="form-group">
          <label for="route-notes">Notatki</label>
          <textarea id="route-notes" rows="3" placeholder="Dodatkowe informacje..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-danger" id="route-delete-btn" style="display:none">&#128465; Usuń trasę</button>
        <div class="modal-footer-right">
          <button class="btn-secondary" id="route-cancel-btn">Anuluj</button>
          <button class="btn-primary" id="route-save-btn">Zapisz</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════
       MODAL: Manage Vehicles (list)
  ═══════════════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="vehicles-modal" style="display:none">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2>Zarządzaj pojazdami</h2>
        <button class="modal-close" id="vehicles-modal-close">&#10005;</button>
      </div>
      <div class="modal-body">
        <div id="vehicles-list"></div>
        <button class="btn-add-vehicle" id="add-vehicle-btn">&#43; Dodaj pojazd</button>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════
       MODAL: Add / Edit Single Vehicle
  ═══════════════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="vehicle-edit-modal" style="display:none">
    <div class="modal modal-small">
      <div class="modal-header">
        <h2 id="vehicle-edit-title">Dodaj pojazd</h2>
        <button class="modal-close" id="vehicle-edit-close">&#10005;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="vehicle-edit-id">

        <div class="form-group">
          <label for="vehicle-name">Numer rejestracyjny / Nazwa</label>
          <input type="text" id="vehicle-name" placeholder="np. WL6952K" maxlength="20" required>
        </div>

        <div class="form-group">
          <label>Kolor identyfikacyjny</label>
          <div class="color-picker-wrap">
            <input type="color" id="vehicle-color" value="#3498db">
            <div class="color-presets" id="color-presets"></div>
          </div>
        </div>

        <!-- Live preview -->
        <div class="vehicle-preview">
          <span id="vehicle-preview-name" class="preview-name">PODGLĄD</span>
          <div class="preview-bar" id="vehicle-preview-bar"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-danger" id="vehicle-delete-btn" style="display:none">&#128465; Usuń pojazd</button>
        <div class="modal-footer-right">
          <button class="btn-secondary" id="vehicle-cancel-btn">Anuluj</button>
          <button class="btn-primary" id="vehicle-save-btn">Zapisz</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════
       MODAL: Manage Drivers
  ═══════════════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="drivers-modal" style="display:none">
    <div class="modal modal-small">
      <div class="modal-header">
        <h2>&#128100; Kierowcy</h2>
        <button class="modal-close" id="drivers-modal-close">&#10005;</button>
      </div>
      <div class="modal-body">
        <!-- Add new driver -->
        <div class="driver-add-row">
          <input type="text" id="new-driver-name" placeholder="Imię i nazwisko kierowcy..." maxlength="60">
          <button class="btn-primary" id="driver-add-btn">Dodaj</button>
        </div>
        <div class="driver-add-error" id="driver-add-error" style="display:none"></div>
        <!-- List -->
        <div id="drivers-list" class="drivers-list"></div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════
       NOTIFICATION PANEL (bottom-right)
  ═══════════════════════════════════════════════════════════════════ -->
  <div class="notif-container" id="notif-container">
    <button class="notif-bell" id="notif-bell" title="Przypomnienia">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="notif-badge" id="notif-badge" style="display:none">0</span>
    </button>

    <div class="notif-panel" id="notif-panel" style="display:none">
      <div class="notif-panel-header">
        <span class="notif-panel-title">🔔 Przypomnienia</span>
        <button class="notif-panel-close" id="notif-panel-close">&#10005;</button>
      </div>
      <div class="notif-list" id="notif-list">
        <!-- Rendered by JS -->
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════
       MODAL: Set Vehicle Status
  ═══════════════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="status-modal" style="display:none">
    <div class="modal modal-small">
      <div class="modal-header">
        <h2 id="status-modal-title">Ustaw status pojazdu</h2>
        <button class="modal-close" id="status-modal-close">&#10005;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="status-vehicle-id">
        <p class="status-modal-context" id="status-modal-context"></p>

        <div class="status-options" id="status-options">
          <button class="status-opt-btn" data-status="looking">
            <span class="status-opt-icon">🔍</span>
            <span class="status-opt-label">Szukam następnego ładunku</span>
          </button>
          <button class="status-opt-btn" data-status="end_of_day">
            <span class="status-opt-icon">🏁</span>
            <span class="status-opt-label">Kończy pracę na dziś</span>
          </button>
          <button class="status-opt-btn" data-status="pause">
            <span class="status-opt-icon">⏸</span>
            <span class="status-opt-label">Pauza</span>
          </button>
          <button class="status-opt-btn" data-status="service">
            <span class="status-opt-icon">🔧</span>
            <span class="status-opt-label">W serwisie</span>
          </button>
          <button class="status-opt-btn" data-status="other">
            <span class="status-opt-icon">📝</span>
            <span class="status-opt-label">Inne...</span>
          </button>
        </div>

        <div class="form-group" id="status-note-group" style="display:none; margin-top:12px">
          <label for="status-note">Notatka</label>
          <textarea id="status-note" rows="2" placeholder="Wpisz notatkę..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <div class="modal-footer-right">
          <button class="btn-secondary" id="status-cancel-btn">Anuluj</button>
          <button class="btn-primary" id="status-save-btn" style="display:none">Zapisz</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
